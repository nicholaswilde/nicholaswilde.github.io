---
version: '3'

var:
  VER: 2.5
  
tasks:
  glite:
    desc: Run Gemini with the gemini-2.5-flash-lite model.
    cmds:
      - gemini -m gemini-{{ .VER }}-flash-lite
  gflash:
    desc: Run Gemini with the gemini-2.5-flash model.
    cmds:
      - gemini -m gemini-{{ .VER }}-flash
  gpro:
    desc: 'Run Gemini with the gemini-{{ .VER }}-pro model.'
    cmds:
      - gemini -m gemini-{{ .VER }}-pro

  install:
    desc: Install hugo
    cmds:
      - brew install hugo
  update:
    desc: Update docker image
    cmds:
      - docker pull hugomods/hugo
  serve:
    desc: Start the hugo server using a Docker image
    cmds:
      - docker run -it --rm -v "${PWD}":/src hugomods/hugo server -w
  serve-local:
    desc: Start the hugo server using local installation
    cmds:
      - hugo server -w
  deps:
    desc: Install theme
    cmds:
      - hugo mod get -u github.com/hugo-toha/toha/v4
  bootstrap:
    desc: Bootstrap development dependencies and resolve theme environment
    cmds:
      - hugo mod tidy
      - hugo mod npm pack
      - npm install
      - npm install cytoscape@3.30.2 --save-dev
  hooks:
    desc: Install pre-commit git hooks
    cmds:
      - pre-commit install
  lint:
    desc: Run linters and configuration validation scripts
    cmds:
      - python3 scripts/test_skills.py
  default:
    cmds:
      - task -l
    silent: true
